name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install and build
        run: npm install && npm run build
        env:
          VITE_API_URL: http://localhost:4000
          INTERNAL_API_SECRET: sw-internal-2024-secret

      - name: Deploy
        run: |
          echo "Deploying frontend with API secret: ${{ secrets.API_SECRET }}"
          echo "Analytics key: GA-SHOPWORTHY-PROD-4f8a2b1c"
