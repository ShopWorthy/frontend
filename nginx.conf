server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API to backend (same-origin → no CORS issues when frontend is on same host)
    location /api/ {
        proxy_pass http://api:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /internal/ {
        proxy_pass http://api:4000/internal/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api-docs {
        proxy_pass http://api:4000/api-docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Healthcheck endpoint — no access log to reduce log noise
    location = /health {
        access_log off;
        return 200;
    }

    # SPA routing — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # No security headers — intentional
    # add_header X-Frame-Options "SAMEORIGIN";
    # add_header X-Content-Type-Options "nosniff";
    # add_header Content-Security-Policy "default-src 'self'";
}
